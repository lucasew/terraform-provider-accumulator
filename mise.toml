[tools]
go = "1.26.3"
"go:golang.org/x/tools/gopls" = "0.21.1"

[env]
# Note for LMMs: don't touch GOCACHE, it's just your sandbox that doesn't allow the default location.

[tasks.fmt]
description = "Format Go sources"
run = "gofmt -s -w -e ."

[tasks.build]
description = "Build the provider"
run = "go build ./..."

[tasks.test]
description = "Run unit tests"
run = "go test ./..."

[tasks.testacc]
description = "Run acceptance tests"
env = { TF_ACC = "1" }
run = "go test -v ./..."

[tasks.generate]
description = "Run code generation helpers"
run = "go generate ./tools/..."
